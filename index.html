<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barbearia Lucas Freitas</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: linear-gradient(180deg, #000, #111);
  color: #fff;
  text-align: center;
}

header {
  padding: 50px 20px;
}

h1 {
  font-size: 32px;
  color: #f1c40f;
}

p {
  color: #ccc;
}

.section {
  padding: 30px;
}

.card {
  background: #1a1a1a;
  padding: 20px;
  margin: 15px;
  border-radius: 12px;
}

.btn {
  background: #f1c40f;
  padding: 15px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  font-weight: bold;
  width: 80%;
}

input, select {
  width: 80%;
  padding: 12px;
  margin: 10px;
  border-radius: 6px;
  border: none;
}

.whatsapp {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #25D366;
  color: white;
  padding: 15px;
  border-radius: 50%;
  font-size: 20px;
  text-decoration: none;
}
</style>
</head>

<body>

<header>
  <h1>Barbearia Lucas Freitas</h1>
  <p>Corte na régua • Barba alinhada • Atendimento diferenciado</p>
</header>

<div class="section card">
  <h2>Agendar horário</h2>

  <input type="text" id="nome" placeholder="Seu nome">

  <select id="servico">
    <option value="Corte - R$30">Corte - R$30</option>
    <option value="Barba - R$25">Barba - R$25</option>
    <option value="Sobrancelha - R$5">Sobrancelha - R$5</option>
  </select>

  <select id="hora">
    <option>08:30</option>
    <option>09:00</option>
    <option>10:00</option>
    <option>11:00</option>
    <option>14:00</option>
    <option>15:00</option>
    <option>16:00</option>
    <option>17:00</option>
    <option>18:00</option>
  </select>

  <button class="btn" onclick="agendar()">Confirmar Agendamento</button>
</div>

<a class="whatsapp" href="https://wa.me/5585986845280" target="_blank">💬</a>

<script>
function agendar() {
  let nome = document.getElementById('nome').value;
  let servico = document.getElementById('servico').value;
  let hora = document.getElementById('hora').value;

  if(nome === "") {
    alert("Digite seu nome!");
    return;
  }

  let mensagem = `Olá, meu nome é ${nome}. Quero agendar ${servico} às ${hora}.`;

  let url = `https://wa.me/5585986845280?text=${encodeURIComponent(mensagem)}`;

  window.open(url, '_blank');
}
</script>

</body>
</html>
